<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Imóvel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <h1>🏠 Cadastrar Imóvel</h1>
    <a th:href="@{/}" class="btn-voltar">⬅ Início</a>

    <form th:action="@{/imoveis/salvar}" 
          th:object="${imovel}" 
          method="post"
          enctype="multipart/form-data">

        <!-- Endereço -->
        <div class="form-group">
            <label for="endereco">Endereço:</label>
            <input type="text" th:field="*{endereco}" id="endereco" required />
        </div>

        <!-- Tipo de negócio: Alugar ou Vender -->
        <div class="form-group">
            <label for="negocio">Negócio:</label>
            <select th:field="*{negocio}" id="negocio" required>
                <option value="">Selecione</option>
                <option value="Alugar">Alugar</option>
                <option value="Vender">Vender</option>
            </select>
        </div>

        <!-- Tipo de imóvel -->
        <div class="form-group">
            <label for="tipo">Tipo:</label>
            <input type="text" th:field="*{tipo}" id="tipo" />
        </div>

        <!-- Quartos, Banheiros, Vagas -->
        <div class="form-group">
            <label for="quartos">Quartos:</label>
            <input type="number" th:field="*{quartos}" id="quartos" min="0" />
        </div>

        <div class="form-group">
            <label for="banheiros">Banheiros:</label>
            <input type="number" th:field="*{banheiros}" id="banheiros" min="0" />
        </div>

        <div class="form-group">
            <label for="vagas">Vagas:</label>
            <input type="number" th:field="*{vagas}" id="vagas" min="0" />
        </div>

        <!-- Mobiliado -->
        <div class="form-group checkbox-group">
            <input type="checkbox" th:field="*{mobilia}" id="mobilia" />
            <label for="mobilia">Mobiliado</label>
        </div>

        <!-- Disponibilidade -->
        <div class="form-group checkbox-group">
            <input type="checkbox" th:field="*{disponivel}" id="disponivel" />
            <label for="disponivel">Disponível</label>
        </div>

        <!-- Descrição -->
        <div class="form-group">
            <label for="descricao">Descrição:</label>
            <textarea th:field="*{descricao}" id="descricao" rows="3"></textarea>
        </div>

        <!-- Valor do Aluguel / Venda -->
        <div class="form-group">
            <label for="valorAluguel">Valor:</label>
            <input type="number" step="0.01" th:field="*{valorAluguel}" id="valorAluguel" />
        </div>

        <!-- Foto -->
        <div class="form-group">
            <label for="arquivoFoto">Foto do Imóvel:</label>
            <input type="file" name="arquivoFoto" id="arquivoFoto" />
        </div>

        <!-- Contrato (opcional) -->
        <div class="form-group">
            <label for="arquivoContrato">Contrato (opcional):</label>
            <input type="file" name="arquivoContrato" id="arquivoContrato" />
        </div>

        <!-- Botão de salvar -->
        <div class="form-group">
            <button type="submit" class="btn-submit">Salvar Imóvel</button>
        </div>

    </form>
</div>

</body>
</html>
