<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Imóvel</title>
<link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>

<div class="container">
    <h2>Cadastrar Imóvel</h2>

    <form th:action="@{/imoveis/salvar}" 
      th:object="${imovel}" 
      method="post"
      enctype="multipart/form-data">

    <div class="form-group">
        <label for="endereco">Endereço:</label>
        <input type="text" th:field="*{endereco}" id="endereco" required />
    </div>

    <div class="form-group">
        <input type="file" name="arquivoFoto" />
    <input type="file" name="arquivoContrato" />

    <div class="form-group">
        <label for="tipo">Tipo:</label>
        <input type="text" th:field="*{tipo}" id="tipo" />
    </div>

    <div class="form-group">
        <label for="descricao">Descrição:</label>
        <input type="text" th:field="*{descricao}" id="descricao" />
    </div>

    <div class="form-group">
        <label for="valorAluguel">Valor do Aluguel:</label>
        <input type="number" step="0.01" th:field="*{valorAluguel}" id="valorAluguel" />
    </div>

    <div class="form-group checkbox-group">
        <input type="checkbox" th:field="*{disponivel}" id="disponivel" />
        <label for="disponivel">Disponível para locação</label>
    </div>

    <div class="form-group">
        <button type="submit" class="btn-submit">Salvar Imóvel</button>
    </div>

</form>
