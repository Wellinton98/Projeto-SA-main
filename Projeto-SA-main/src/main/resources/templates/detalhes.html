<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Detalhes do Imóvel - ' + ${imovel.tipo}">Detalhes do Imóvel</title>
    <link rel="stylesheet" th:href="@{/css/lista-imoveis.css}">
    <style>
        /* Estilo das abas internas */
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            background: #f5f5f5;
            margin-right: 5px;
            transition: 0.3s;
        }
        .tab.active {
            background: #2980b9;
            color: #fff;
            font-weight: bold;
        }
        .tab-content {
            display: none;
            padding: 20px 0;
        }
        .tab-content.active {
            display: block;
        }
        /* Card principal */
        .card-detalhe {
            max-width: 700px;
            margin: 30px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .card-detalhe img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .card-detalhe .card-body {
            padding: 20px;
        }
        .btn-excluir, .btn-voltar {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            color: #fff;
            background: #e74c3c;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-excluir:hover, .btn-voltar:hover {
            opacity: 0.9;
        }
        .btn-voltar {
            background: #2980b9;
        }
    </style>
</head>
<body>

<header>
    <h1 th:text="'🏠 ' + ${imovel.tipo}"></h1>
    <a th:href="@{/imoveis}" class="btn-voltar">⬅ Voltar</a>
</header>

<div class="container">

    <div class="card card-detalhe">
        <img th:if="${imovel.foto != null}" th:src="@{'/uploads/' + ${imovel.foto}}" alt="Foto do imóvel">

        <div class="card-body">
            <!-- Abas -->
            <div class="tabs">
                <div class="tab active" data-tab="descricao">Descrição</div>
                <div class="tab" data-tab="informacoes">Informações</div>
                <div class="tab" data-tab="localizacao">Localização</div>
                <div class="tab" data-tab="fotos">Fotos</div>
            </div>

            <!-- Conteúdo das abas -->
            <div id="descricao" class="tab-content active">
                <p th:text="${imovel.descricao}"></p>
            </div>

            <div id="informacoes" class="tab-content">
                <p><strong>Endereço:</strong> <span th:text="${imovel.endereco}"></span></p>
                <p>🛏 Quartos: <span th:text="${imovel.quartos}"></span></p>
                <p>🚿 Banheiros: <span th:text="${imovel.banheiros}"></span></p>
                <p>🚗 Vagas: <span th:text="${imovel.vagas}"></span></p>
                <p><strong>Negócio:</strong> <span th:text="${imovel.negocio}"></span></p>
                <p class="valor" th:text="'R$ ' + ${imovel.valorAluguel}"></p>
                <p th:if="${imovel.disponivel}" style="color: green;">Disponível</p>
                <p th:if="${!imovel.disponivel}" style="color: red;">Indisponível</p>
            </div>

            <div id="localizacao" class="tab-content">
                <p>📍 Localização: <span th:text="${imovel.endereco}"></span></p>
                <!-- Aqui você pode adicionar mapa ou embed de Google Maps futuramente -->
            </div>

            <div id="fotos" class="tab-content">
                <p>Galeria de Fotos:</p>
                <img th:if="${imovel.foto != null}" th:src="@{'/uploads/' + ${imovel.foto}}" alt="Foto do imóvel" style="width:100%; margin-top:10px;">
                <!-- Você pode adicionar outras fotos se tiver -->
            </div>

            <!-- Botão Excluir -->
            <a th:href="@{/imoveis/excluir/{id}(id=${imovel.idImovel})}" class="btn-excluir" onclick="return confirm('Tem certeza que deseja excluir?')">❌ Excluir</a>

        </div>
    </div>

</div>

<script>
    // Script para alternar abas
    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.tab-content');

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');

            contents.forEach(c => c.classList.remove('active'));
            document.getElementById(tab.dataset.tab).classList.add('active');
        });
    });
</script>

</body>
</html>
